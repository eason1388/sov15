<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>道法專欄｜隨緣堂</title>
  <meta name="description" content="隨緣堂道法專欄，收錄道家玄學、養氣、祭改、收驚、安魂、驅邪、法事與修行文章。未來新增文章只需加入資料，不必改首頁。" />
  <meta name="keywords" content="隨緣堂,道法,玄學,避邪,治病,養生,收驚,祭改,送厄,安魂,驅邪,法事,道家養氣,淨宅,補運,補財庫,符咒,元辰宮,家宅淨化" />
  <meta property="og:title" content="道法專欄｜隨緣堂" />
  <meta property="og:description" content="收錄道家玄學、養氣、祭改、收驚、安魂、驅邪與修行文章。" />
  <meta property="og:type" content="website" />
  <style>
    :root{--bg:#04070f;--bg2:#0c1430;--card:#121d3d;--line:rgba(200,168,75,.32);--gold:#d6b459;--teal:#36d0df;--text:#eef1fb;--muted:#aab2c7;--btn:#2d6ee7}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:"Noto Sans TC",sans-serif;background:radial-gradient(circle at 50% 30%,#10204a 0%,#04070f 55%,#02040a 100%);color:var(--text)}
    a{text-decoration:none;color:inherit}
    .wrap{max-width:1120px;margin:0 auto;padding:0 20px}
    .nav{position:sticky;top:0;z-index:10;background:rgba(4,7,15,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(54,208,223,.18)}
    .navin{height:72px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:"Noto Serif TC",serif;font-size:1.8rem;font-weight:900;color:var(--gold);letter-spacing:.12em}
    .logo span{display:block;font-size:.8rem;color:var(--teal);letter-spacing:.28em;margin-top:-3px}
    .navlinks{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
    .navlinks a{color:#c4cbe0} .navlinks a:hover{color:var(--gold)}
    .cta{padding:10px 18px;border:1px solid rgba(54,208,223,.4);border-radius:6px;color:var(--teal)!important}
    .hero{padding:82px 0 34px;text-align:center}
    .badge{display:inline-block;padding:6px 14px;border:1px solid var(--line);border-radius:999px;color:var(--gold);letter-spacing:.18em;font-size:.84rem}
    h1{font-family:"Noto Serif TC",serif;font-size:clamp(2rem,5vw,3.4rem);margin:18px 0 14px;letter-spacing:.1em}
    .sub{max-width:820px;margin:0 auto;color:var(--muted);line-height:2;font-size:1.06rem}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:26px;padding:26px 0 80px}
    .card{background:linear-gradient(180deg,rgba(19,31,69,.96),rgba(10,17,38,.96));border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.26)}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--teal);font-size:.92rem;margin-bottom:14px}
    .card h2{font-family:"Noto Serif TC",serif;font-size:1.5rem;line-height:1.45;margin:0 0 12px;color:#fff4d1}
    .excerpt{color:var(--muted);line-height:1.9;min-height:5.6em}
    .tags{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 22px}
    .tag{padding:5px 10px;border-radius:999px;background:rgba(214,180,89,.09);border:1px solid rgba(214,180,89,.26);color:#f2d68d;font-size:.84rem}
    .btn{display:inline-block;padding:12px 18px;border-radius:12px;background:var(--btn);font-weight:700}
    .footer{padding:24px 0 40px;color:#91a0c1;text-align:center;border-top:1px solid rgba(255,255,255,.06)}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="nav"><div class="wrap navin"><a class="logo" href="index.html">隨緣堂<span>SUÌ YUÁN TÁNG</span></a><div class="navlinks"><a href="index.html">回首頁</a><a href="daofa.html">第一篇文章</a><a class="cta" href="index.html#consult">線上諮詢</a></div></div></nav>
  <main class="wrap">
    <section class="hero">
      <div class="badge">道 法 專 欄</div>
      <h1>隨緣堂．道法專欄</h1>
      <p class="sub">這一區是獨立專欄，不會顯示在首頁內容中，但會從導覽列直接進入。之後你要新增文章時，只需要新增文章頁並在 <code>articles.json</code> 裡補一筆資料，不需要再改 <code>index.html</code>。</p>
    </section>
    <section id="list" class="cards"></section>
  </main>
  <footer class="footer wrap">聯絡信箱：jackkok1388@gmail.com</footer>
  <script>
    async function loadArticles(){
      const res = await fetch('articles.json');
      const items = await res.json();
      const list = document.getElementById('list');
      list.innerHTML = items.map(item => `
        <article class="card">
          <div class="meta"><span>${item.column}</span><span>${item.date}</span></div>
          <h2>${item.title}</h2>
          <p class="excerpt">${item.excerpt}</p>
          <div class="tags">${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <a class="btn" href="${item.url}">閱讀全文</a>
        </article>
      `).join('');
    }
    loadArticles().catch(()=>{document.getElementById('list').innerHTML='<div class="card"><h2>文章資料載入失敗</h2><p class="excerpt">請確認 <code>articles.json</code> 已一併上傳到 GitHub Pages。</p></div>';});
  </script>
</body>
</html>
